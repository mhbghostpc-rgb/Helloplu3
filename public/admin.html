<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Cinzel:wght@600;700&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="assets/js/auth.js"></script>
    <style>
      :root {
        --gold: #d4af37;
        --gold-soft: rgba(212, 175, 55, 0.25);
        --cream: #f7f2e9;
        --glass: rgba(12, 18, 28, 0.7);
        --border: rgba(212, 175, 55, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
        color: var(--cream);
        background:
          radial-gradient(900px 420px at 15% -10%, rgba(212, 175, 55, 0.18), transparent 70%),
          radial-gradient(800px 520px at 85% 10%, rgba(79, 127, 163, 0.18), transparent 70%),
          linear-gradient(140deg, #070a10, #0f172a 55%, #111827);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 18px;
      }

      .frame {
        width: min(900px, 100%);
        position: relative;
      }

      .aura {
        position: absolute;
        inset: -40px;
        background:
          radial-gradient(300px 140px at 20% 0%, rgba(212, 175, 55, 0.25), transparent 70%),
          radial-gradient(360px 200px at 80% 100%, rgba(82, 154, 178, 0.2), transparent 70%);
        filter: blur(10px);
        z-index: 0;
      }

      .card {
        position: relative;
        z-index: 1;
        padding: 34px;
        border-radius: 26px;
        background: var(--glass);
        border: 1px solid var(--border);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(16px);
      }

      h1 {
        margin: 0 0 6px 0;
        font-family: "Cinzel", serif;
        color: var(--gold);
        font-size: clamp(28px, 4vw, 36px);
      }

      .subtitle {
        margin: 0 0 24px 0;
        color: #cbd5f5;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: #cbd5f5;
        font-size: 14px;
      }

      input,
      select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(248, 231, 177, 0.25);
        background: rgba(15, 23, 42, 0.7);
        color: #f8fafc;
        font-size: 15px;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: rgba(212, 175, 55, 0.8);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
      }

      .actions {
        margin-top: 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: none;
        padding: 12px 18px;
        border-radius: 12px;
        font-weight: 700;
        background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
        color: #0f172a;
        cursor: pointer;
      }

      .ghost {
        background: transparent;
        color: #fca5a5;
      }

      .notice {
        margin-top: 12px;
        color: #94a3b8;
        font-size: 14px;
      }

      .success {
        color: #86efac;
      }

      .error {
        color: #fca5a5;
      }

      .hint {
        margin-top: 16px;
        font-size: 13px;
        color: #94a3b8;
      }

      .access-denied {
        display: none;
        margin: 0 auto;
        max-width: 520px;
        padding: 24px;
        border-radius: 18px;
        background: rgba(12, 18, 28, 0.8);
        border: 1px solid rgba(239, 68, 68, 0.5);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        text-align: center;
      }

      .access-denied h2 {
        margin: 0 0 8px 0;
        color: #fca5a5;
      }

      .access-denied p {
        margin: 0 0 16px 0;
        color: #cbd5f5;
      }

      .access-denied a {
        color: #f8e7b1;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="access-denied" id="access-denied">
        <h2>Access denied</h2>
        <p>You do not have permission to view this page.</p>
        <a href="login.html">Return to login</a>
      </div>

      <div id="admin-content" style="display: none">
      <div class="aura"></div>
      <section class="card">
        <h1>Admin Dashboard</h1>
        <p class="subtitle">Create or update user profile details and access levels.</p>

        <form id="admin-form">
          <div class="grid">
            <div>
              <label for="email">User email</label>
              <input type="email" id="email" required />
            </div>
            <div>
              <label for="full-name">Full name</label>
              <input type="text" id="full-name" required />
            </div>
            <div>
              <label for="password">Temporary password</label>
              <input type="password" id="password" minlength="6" required />
            </div>
            <div>
              <label for="phone">Phone number</label>
              <input type="tel" id="phone" required />
            </div>
            <div>
              <label for="access-level">Access level</label>
              <select id="access-level" required>
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button type="submit">Save profile</button>
            <button type="button" class="ghost" id="back-button">Back</button>
          </div>
        </form>

        <p class="notice" id="admin-message"></p>
        <p class="hint">
          Accounts are created immediately in Supabase and assigned an access level.
        </p>
      </section>
      </div>
    </div>

    <script>
      const form = document.getElementById("admin-form");
      const messageEl = document.getElementById("admin-message");
      const backButton = document.getElementById("back-button");
      const accessDenied = document.getElementById("access-denied");
      const adminContent = document.getElementById("admin-content");

      function setMessage(text, isError) {
        messageEl.textContent = text;
        messageEl.className = isError ? "notice error" : "notice success";
      }

      backButton.addEventListener("click", () => {
        window.location.replace("choice.html");
      });

      window.addEventListener("load", () => {
        if (!window.Auth) {
          accessDenied.style.display = "block";
          return;
        }

        window.Auth.checkAccess({ requireAdmin: true }).then((result) => {
          if (!result.allowed) {
            accessDenied.style.display = "block";
            return;
          }

          adminContent.style.display = "block";
        });
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMessage("", false);

        const payload = {
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value.trim(),
          full_name: document.getElementById("full-name").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          access_level: document.getElementById("access-level").value,
        };

        const { data, error } = await window.Auth.adminCreateUser(payload);
        if (error) {
          setMessage(error.message || "Unable to create user.", true);
          return;
        }

        if (!data || data.ok !== true) {
          setMessage("Unable to create user.", true);
          return;
        }

        setMessage("Account created.", false);
        form.reset();
      });
    </script>
  </body>
</html>
