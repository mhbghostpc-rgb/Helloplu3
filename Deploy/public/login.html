<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Cinzel:wght@600;700&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="assets/js/auth.js"></script>
  </head>
  <body class="login-page">
    <main class="login-shell">
      <div class="brand login-brand">
        <h1>Course Access - Hello Plus</h1>
        <!-- <span>Secure login</span> -->
      </div>
      <p class="login-lead">
        Sign in to unlock your verified course content and device-bound access.
      </p>

      <section class="card">
        <h2>Log in</h2>
        <form id="login-form">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required />

          <label for="login-password">Password</label>
          <input type="password" id="login-password" required />

          <div class="actions">
            <button type="submit">Log in</button>
          </div>
        </form>
        <p class="notice" id="login-message"></p>
        <p class="notice">
        </p>
      </section>

      <section class="card" style="margin-top: 20px">
        <h2>Enter access code</h2>
        <form id="code-form">
          <label for="access-code">Access code</label>
          <input type="text" id="access-code" autocomplete="off" required />
          <div class="actions">
            <button type="submit">Verify access</button>
          </div>
        </form>
        <p class="notice" id="code-message"></p>
      </section>
    </main>

    <script>
      const loginForm = document.getElementById("login-form");
      const codeForm = document.getElementById("code-form");
      const loginMessage = document.getElementById("login-message");
      const codeMessage = document.getElementById("code-message");

      function setMessage(el, message, isError) {
        el.textContent = message;
        el.className = isError ? "notice error" : "notice success";
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginMessage.textContent = "";

        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value.trim();

        const { error } = await window.Auth.signIn(email, password);
        if (error) {
          setMessage(loginMessage, error.message, true);
          return;
        }

        setMessage(loginMessage, "Logged in. Enter your access code.", false);
      });

      codeForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        codeMessage.textContent = "";

        const code = document.getElementById("access-code").value.trim();
        if (!code) {
          setMessage(codeMessage, "Access code is required.", true);
          return;
        }

        const { data, error } = await window.Auth.activateAccessCode(code);
        if (error) {
          setMessage(codeMessage, error.message, true);
          return;
        }

        if (data.allowed) {
          window.Auth.setAccessCode(code);
          setMessage(codeMessage, "Access granted. Redirecting...", false);
          window.location.replace("choice.html");
        } else {
          const reasonMap = {
            invalid_code: "That access code is invalid.",
            device_mismatch:
              "This access code is already linked to another device.",
            not_authenticated: "Please log in before entering your code.",
            invalid_device_key: "Device key was missing. Try again.",
          };
          const message = reasonMap[data.reason] || "Access denied.";
          setMessage(codeMessage, message, true);
        }
      });
    </script>
  </body>
</html>
