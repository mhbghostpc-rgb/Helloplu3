<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modals of Deduction - Mr Moheb Mousa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        if (window.Auth) {
            window.Auth.guardMainPage();
        } else {
            window.location.replace("login.html");
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Nunito:wght@400;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #e94560);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 2rem;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .en-text { font-family: 'Nunito', sans-serif; }
        
        /* الخط المتصل الجذاب للاسم والرقم */
        .cursive-name { 
            font-family: 'Dancing Script', cursive; 
            line-height: 1.2;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 2rem;
        }
        
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #1a1a2e;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(253, 160, 133, 0.5);
            border-color: transparent;
        }
        
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* أزرار الإجابات */
        .option-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            color: #334155;
            transition: all 0.3s;
        }
        .option-btn:hover:not(:disabled) {
            background: #f1f5f9;
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .option-selected { background: #eff6ff; border-color: #3b82f6; color: #1e3a8a; }
        
        .correct-ans { background: linear-gradient(135deg, #22c55e, #16a34a) !important; color: white !important; border-color: #16a34a !important; transform: scale(1.02);}
        .wrong-ans { background: linear-gradient(135deg, #ef4444, #dc2626) !important; color: white !important; border-color: #dc2626 !important;}
        
        .input-field {
            width: 100%; padding: 1.25rem; border: 2px solid #e2e8f0; border-radius: 1rem;
            font-size: 1.25rem; transition: all 0.3s; text-align: left; direction: ltr;
        }
        .input-field:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .input-correct { border-color: #22c55e; background-color: #f0fdf4; color: #16a34a;}
        .input-wrong { border-color: #ef4444; background-color: #fef2f2; color: #dc2626;}

        .info-box { border-left: 6px solid; transition: transform 0.3s; background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .info-box:hover { transform: translateX(-5px); }

        /* تأثير الحركة للتاج */
        .float-crown { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <audio id="clapSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>

    <div id="app-root" class="w-full max-w-5xl relative z-10 px-4 mt-4"></div>

    <script>
        // ==========================================
        // بيانات الأسئلة
        // ==========================================
        
        const chooseQuestions = [
            { text: "I think someone should have ... some more trees in the park.", options: ["plant", "planting", "planted", "plants"], answer: 2 },
            { text: "I think I might ... my keys. Have you seen them?", options: ["lost", "had lost", "have lost", "losing"], answer: 2 },
            { text: "Climbing that mountain ... have been easy to do.", options: ["can", "can't", "wasn't", "didn't"], answer: 1 },
            { text: "It ... rained a lot last week - the flowers have grown huge!", options: ["must have", "can't have", "have", "mustn't"], answer: 0 },
            { text: "The house is very quiet. Hany and Kamal must ... practicing their music for today.", options: ["stop", "stopped", "have stopped", "stops"], answer: 2 },
            { text: "I think I might ... left my keys on my desk at school.", options: ["having", "had", "has", "have"], answer: 3 },
            { text: "The streets were wet, but the sky was clear. It might have ...", options: ["rain", "rains", "rained", "raining"], answer: 2 },
            { text: "Mona knows the lesson perfectly. She ... have studied hard yesterday.", options: ["must", "can't", "might", "shouldn't"], answer: 0 },
            { text: "The lights are off and the door is locked. They ... the office already.", options: ["must have left", "can't have left", "might have left", "shouldn't have left"], answer: 0 },
            { text: "Ramy arrived at school on time, even though the roads were crowded. He ... have taken a shortcut.", options: ["must", "can't", "can", "shouldn't"], answer: 0 },
            { text: "Noha looks upset because she failed the test. She ... have revised more carefully.", options: ["should", "must", "shouldn't", "might"], answer: 0 },
            { text: "Shady wanted to go to the park with his friends. He isn't in his room. He might ... to the park.", options: ["have gone", "went", "go", "going"], answer: 0 },
            { text: "Rania got full marks without studying. She might have ... in the exam.", options: ["cheat", "cheats", "cheating", "cheated"], answer: 3 },
            { text: "That story is impossible. Omar ... seen a lion in our backyard.", options: ["might have", "should have", "can't have", "must have"], answer: 2 },
            { text: "I can't find my wallet anywhere. I ... left it in the taxi.", options: ["must have", "can't have", "should have", "shouldn't have"], answer: 0 },
            { text: "The cake is burned. You ... have left it in the oven for so long.", options: ["can't", "might", "should", "shouldn't"], answer: 3 },
            { text: "Noha looks exhausted today. She ... slept well last night.", options: ["can't have", "must have", "should have", "shouldn't have"], answer: 0 },
            { text: "I sent Tarek an email yesterday, but he still hasn't answered it. He ... have seen it.", options: ["must", "might", "shouldn't", "might not"], answer: 3 }
        ];

        const correctQuestions = [
            { text: "Some companies must have (learn) from the mistakes they made in the past.", correctAnswer: "learned" },
            { text: "We should (take) those clothes to the thrift store yesterday.", correctAnswer: "have taken" },
            { text: "I waved at Malek, but he didn't wave back. He (might) have seen me.", correctAnswer: "might not" },
            { text: "She must (had) walked to school.", correctAnswer: "have" },
            { text: "They (can't go) to the airport yet because their flight isn't until tomorrow.", correctAnswer: "can't have gone" },
            { text: "He (must) have been at home last night. I am not sure.", correctAnswer: "might" },
            { text: "They were at school all afternoon, so they can't (watch) the match.", correctAnswer: "have watched" },
            { text: "Asmaa didn't answer my calls; she might (leave) her phone at home.", correctAnswer: "have left" },
            { text: "The roads were muddy, so it (can't) have rained heavily last night.", correctAnswer: "must" },
            { text: "He looked stressed after the test; he (can't study) all night.", correctAnswer: "can't have studied" },
            { text: "The shop was closed all day, so it can't have (be) open this morning.", correctAnswer: "been" },
            { text: "Perhaps Amin is late because of traffic. He (can't) be stuck on the road.", correctAnswer: "might" },
            { text: "He kept coughing, so he should have (see) a doctor earlier.", correctAnswer: "seen" },
            { text: "He wasn't at school yesterday. He might (be) ill.", correctAnswer: "have been" },
            { text: "The door was locked from the inside, so they can't (come) through this entrance.", correctAnswer: "have come" }
        ];

        // ==========================================
        // App State
        // ==========================================
        let state = {
            activeTab: 'learn', // 'learn', 'choose', 'correct'
            
            // Choose State
            chooseIndex: 0,
            chooseSelected: null,
            chooseShowAnswer: false,
            
            // Correct State
            correctIndex: 0,
            correctInput: "",
            correctShowAnswer: false,
            
            // Score tracking
            score: 0
        };

        // ==========================================
        // Handlers
        // ==========================================
        function setTab(tab) {
            state.activeTab = tab;
            state.score = 0; // تصفير العداد عند تغيير التبويب
            if(tab === 'choose') { state.chooseIndex = 0; state.chooseSelected = null; state.chooseShowAnswer = false; state.finished = false; }
            if(tab === 'correct') { state.correctIndex = 0; state.correctInput = ""; state.correctShowAnswer = false; state.finished = false; }
            render();
        }

        function playSound() {
            const audio = document.getElementById('clapSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Audio prevented"));
            }
        }

        // ---------- Choose Logic ----------
        function selectOption(index) {
            if (state.chooseShowAnswer) return;
            state.chooseSelected = index;
            render();
        }

        function revealChooseAnswer() {
            if (state.chooseSelected === null) {
                alert("Please select an answer first! 💡");
                return;
            }
            state.chooseShowAnswer = true;
            if (state.chooseSelected === chooseQuestions[state.chooseIndex].answer) {
                state.score++;
                playSound();
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            }
            render();
        }

        function nextChooseQuestion() {
            if (state.chooseIndex < chooseQuestions.length - 1) {
                state.chooseIndex++;
                state.chooseSelected = null;
                state.chooseShowAnswer = false;
            } else {
                state.finished = true;
                playSound();
                confetti({ particleCount: 300, spread: 150 });
            }
            render();
        }

        // ---------- Correct Logic ----------
        function handleInput(val) {
            if (state.correctShowAnswer) return;
            state.correctInput = val; 
        }

        function revealCorrectAnswer() {
            if (state.correctInput.trim() === "") {
                alert("Please type your answer first! 💡");
                return;
            }
            state.correctShowAnswer = true;
            const q = correctQuestions[state.correctIndex];
            const userAns = state.correctInput.trim().toLowerCase();
            let isCorrect = (userAns === q.correctAnswer.toLowerCase() || 
                            (q.correctAnswer === "learned" && userAns === "learnt") ||
                            (q.correctAnswer === "might" && userAns === "may"));
            
            if (isCorrect) {
                state.score++;
                playSound();
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            }
            render();
        }

        function nextCorrectQuestion() {
            if (state.correctIndex < correctQuestions.length - 1) {
                state.correctIndex++;
                state.correctInput = "";
                state.correctShowAnswer = false;
            } else {
                state.finished = true;
                playSound();
                confetti({ particleCount: 300, spread: 150 });
            }
            render();
        }

        function restartPractice() {
            state.chooseIndex = 0;
            state.chooseSelected = null;
            state.chooseShowAnswer = false;
            state.correctIndex = 0;
            state.correctInput = "";
            state.correctShowAnswer = false;
            state.score = 0;
            state.finished = false;
            render();
        }

        // ==========================================
        // Render Functions
        // ==========================================
        function renderHeader() {
            return `
                <div class="sticky top-4 z-50 flex justify-center w-full mb-6 pointer-events-none fade-in">
                    <div class="inline-block bg-black/50 backdrop-blur-xl px-8 py-3 rounded-[2.5rem] shadow-[0_10px_30px_rgba(0,0,0,0.5)] border border-yellow-500/30 pointer-events-auto transition-transform hover:scale-105">
                        <div class="flex items-center justify-center gap-3">
                            <span class="text-3xl md:text-4xl float-crown">👑</span>
                            <div class="flex flex-col items-center justify-center pt-1">
                                <span class="cursive-name text-yellow-400 text-4xl md:text-5xl drop-shadow-[0_0_10px_rgba(253,224,71,0.8)]">Mr Moheb Mousa</span>
                                <span class="cursive-name text-white text-2xl md:text-3xl mt-1 drop-shadow-md tracking-wider">01200621226</span>
                            </div>
                            <span class="text-3xl md:text-4xl float-crown" style="animation-delay: 0.5s;">👑</span>
                        </div>
                    </div>
                </div>

                <header class="text-center mb-8 fade-in">
                    <div class="mt-2">
                        <p class="text-yellow-400 bg-black/30 border border-yellow-500/20 inline-block px-5 py-1.5 rounded-full text-sm font-bold mb-2 shadow-sm">Think like an excellent student 💡</p>
                        <h2 class="text-white text-2xl md:text-3xl font-black drop-shadow-lg en-text mt-1 bg-gradient-to-r from-blue-100 to-purple-100 bg-clip-text text-transparent">
                            Modals of Deduction (Present & Past)
                        </h2>
                    </div>
                </header>
                
                <div class="flex flex-wrap justify-center gap-4 mb-8 fade-in" dir="ltr">
                    <button onclick="setTab('learn')" class="px-6 py-3 rounded-full font-bold text-lg border-2 border-white/50 text-white ${state.activeTab === 'learn' ? 'active' : 'bg-white/10 hover:bg-white/20'} tab-btn en-text shadow-md">📚 Grammar & Examples</button>
                    <button onclick="setTab('choose')" class="px-6 py-3 rounded-full font-bold text-lg border-2 border-white/50 text-white ${state.activeTab === 'choose' ? 'active' : 'bg-white/10 hover:bg-white/20'} tab-btn en-text shadow-md">🎯 Choose Practice</button>
                    <button onclick="setTab('correct')" class="px-6 py-3 rounded-full font-bold text-lg border-2 border-white/50 text-white ${state.activeTab === 'correct' ? 'active' : 'bg-white/10 hover:bg-white/20'} tab-btn en-text shadow-md">✍️ Correct & Rewrite</button>
                </div>
            `;
        }

        function renderLearn() {
            return `
                <div class="fade-in space-y-10">
                    <div class="text-center mb-6">
                        <h2 class="text-3xl md:text-4xl font-black text-gray-800 inline-block bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent en-text">Modals of Deduction</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h3 class="text-2xl font-bold text-blue-800 mb-4 border-b-2 border-blue-200 pb-2 inline-block en-text">1. Present Modals</h3>
                            <div class="space-y-4">
                                <div class="info-box border-green-500 p-5 bg-green-50">
                                    <h4 class="font-bold text-green-700 mb-2">🎯 استنتاج قوي (متأكد)</h4>
                                    <p class="en-text font-black text-lg text-green-600" dir="ltr">must / can't + inf</p>
                                    <p class="text-gray-600 text-sm mt-1 font-bold">لابد أنه / لا يمكن أن يكون</p>
                                </div>
                                <div class="info-box border-yellow-500 p-5 bg-yellow-50">
                                    <h4 class="font-bold text-yellow-700 mb-2">🤔 استنتاج ضعيف (احتمال)</h4>
                                    <p class="en-text font-black text-lg text-yellow-600" dir="ltr">may / might + inf</p>
                                    <p class="text-gray-600 text-sm mt-1 font-bold">من المحتمل / الممكن</p>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-2xl font-bold text-purple-800 mb-4 border-b-2 border-purple-200 pb-2 inline-block en-text">2. Past Modals</h3>
                            <div class="space-y-4">
                                <div class="info-box border-blue-500 p-5 bg-blue-50">
                                    <h4 class="font-bold text-blue-700 mb-2">🎯 استنتاج قوي</h4>
                                    <p class="en-text font-black text-lg text-blue-600" dir="ltr">must / can't + have + p.p</p>
                                    <p class="text-gray-600 text-sm mt-1 font-bold">لابد أنه حدث / مستحيل يكون حدث</p>
                                </div>
                                <div class="info-box border-red-500 p-5 bg-red-50">
                                    <h4 class="font-bold text-red-700 mb-2">🤔 احتمال / ⚠️ لوم وانتقاد</h4>
                                    <p class="en-text font-black text-lg text-red-500" dir="ltr">might + have + p.p <span class="text-gray-500 text-sm font-normal ml-2">(احتمال)</span></p>
                                    <p class="en-text font-black text-lg text-red-500 mt-2" dir="ltr">should(n't) + have + p.p <span class="text-gray-500 text-sm font-normal ml-2">(لوم)</span></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-10 pt-8 border-t-2 border-gray-100">
                        <h3 class="text-3xl font-black text-center text-gray-800 mb-8 en-text">Examples 💡</h3>
                        <div class="space-y-4">
                            ${[
                                { q: "He has a villa and three cars. He (must be) rich.", exp: "استنتاج قوي مضارع (لابد أنه غني)." },
                                { q: "Abdu looked very happy. He (must have done) well.", exp: "استنتاج قوي ماضي (لابد أنه أدى جيداً)." },
                                { q: "I don't know where Nada is. She (may be) at home.", exp: "احتمال مضارع (لست متأكداً)." },
                                { q: "You (shouldn't have shouted) at your sister.", exp: "لوم وانتقاد في الماضي (لم يكن يجب أن تصرخ)." }
                            ].map((item, idx) => `
                                <div class="bg-white p-5 flex flex-col md:flex-row gap-4 items-center border border-gray-200 rounded-xl shadow-sm hover:shadow-md transition">
                                    <div class="bg-gradient-to-br from-blue-500 to-purple-500 text-white w-10 h-10 rounded-full flex items-center justify-center font-black shrink-0">${idx + 1}</div>
                                    <div class="flex-1 text-right" dir="ltr">
                                        <p class="en-text font-bold text-lg text-gray-800 mb-1">${item.q}</p>
                                        <p class="text-blue-700 font-bold bg-blue-50 inline-block px-3 py-1 rounded-full text-sm" dir="rtl">التفسير: ${item.exp}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderEndScreen(totalQs) {
            let pct = (state.score / totalQs) * 100;
            let msg = "";
            let emoji = "🏆";
            
            if (pct >= 90) { 
                msg = "Outstanding Performance! You are a true English master! 🌟"; 
                emoji = "🏆"; 
            } else if (pct >= 75) { 
                msg = "Great Job! You have a solid understanding! 👍"; 
                emoji = "⭐"; 
            } else if (pct >= 50) { 
                msg = "Good Effort! Keep practicing to improve more! 💪"; 
                emoji = "👏"; 
            } else { 
                msg = "Don't give up! Review the grammar rules and try again. 📚"; 
                emoji = "💪"; 
            }

            return `
                <div class="text-center py-12 fade-in max-w-2xl mx-auto">
                    <div class="text-8xl mb-6 drop-shadow-xl">${emoji}</div>
                    <h2 class="text-4xl font-black text-gray-800 mb-4 en-text">Quiz Completed!</h2>
                    
                    <div class="bg-white p-6 rounded-3xl border-2 border-gray-200 shadow-sm mb-8 inline-block min-w-[300px]">
                        <p class="text-xl text-gray-600 font-bold en-text mb-2">Final Score</p>
                        <p class="text-5xl font-black text-blue-600 en-text">${state.score} <span class="text-3xl text-gray-400 mx-2">/</span> ${totalQs}</p>
                    </div>

                    <div class="bg-blue-50 border-2 border-blue-200 p-6 rounded-2xl mb-10 shadow-sm">
                        <p class="text-2xl text-blue-800 font-bold en-text">${msg}</p>
                    </div>
                    
                    <button onclick="restartPractice()" class="px-12 py-4 rounded-full font-black text-xl transition-all shadow-lg text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:scale-105 hover:shadow-xl en-text">
                        ${pct < 50 ? 'Try Again 🔄' : 'Restart Practice 🔄'}
                    </button>
                </div>
            `;
        }

        function renderChoose() {
            if (state.finished) return renderEndScreen(chooseQuestions.length);

            const q = chooseQuestions[state.chooseIndex];
            
            let html = `
                <div class="fade-in max-w-3xl mx-auto">
                    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 border-b-2 border-gray-100 pb-4 gap-4" dir="ltr">
                        <h3 class="text-xl font-black text-blue-800 bg-blue-50 px-6 py-2 rounded-xl border border-blue-200 en-text">🎯 Choose</h3>
                        <div class="flex gap-3">
                            <div class="bg-purple-100 text-purple-800 px-4 py-2 rounded-full font-bold border border-purple-200 en-text shadow-sm text-sm md:text-base">Q: ${state.chooseIndex + 1} / ${chooseQuestions.length}</div>
                            <div class="bg-green-100 text-green-800 px-4 py-2 rounded-full font-bold border border-green-200 en-text shadow-sm text-sm md:text-base">Score: ${state.score}</div>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-3xl border-2 border-gray-100 relative overflow-hidden shadow-sm" dir="ltr">
                        <div class="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                        <h4 class="text-2xl font-bold text-gray-800 en-text mb-8 pl-4 leading-relaxed">${q.text}</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pl-4">
            `;

            q.options.forEach((opt, oIdx) => {
                let btnClass = "option-btn py-4 px-6 rounded-2xl font-bold text-lg en-text ";
                
                if (!state.chooseShowAnswer) {
                    if (state.chooseSelected === oIdx) btnClass += "option-selected transform scale-[1.02] shadow-sm";
                } else {
                    if (oIdx === q.answer) btnClass += "correct-ans";
                    else if (state.chooseSelected === oIdx) btnClass += "wrong-ans";
                    else btnClass += "opacity-50 bg-gray-100 text-gray-400";
                }

                html += `<button ${state.chooseShowAnswer ? 'disabled' : ''} onclick="selectOption(${oIdx})" class="${btnClass}">${opt}</button>`;
            });

            html += `
                        </div>
                    </div>
                    
                    <div class="mt-10 flex justify-center gap-4" dir="ltr">
                        ${!state.chooseShowAnswer 
                            ? `<button onclick="revealChooseAnswer()" class="px-10 py-3 rounded-full font-black text-xl transition-all text-white bg-blue-600 hover:bg-blue-700 hover:scale-105 shadow-lg en-text">Show Answer 👁️</button>`
                            : `<button onclick="nextChooseQuestion()" class="px-10 py-3 rounded-full font-black text-xl transition-all text-white bg-green-600 hover:bg-green-700 hover:scale-105 shadow-lg en-text">${state.chooseIndex === chooseQuestions.length - 1 ? 'See Results 📊' : 'Next Question ➡️'}</button>`
                        }
                    </div>
                </div>
            `;
            return html;
        }

        function renderCorrect() {
            if (state.finished) return renderEndScreen(correctQuestions.length);

            const q = correctQuestions[state.correctIndex];
            
            let html = `
                <div class="fade-in max-w-3xl mx-auto">
                    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 border-b-2 border-gray-100 pb-4 gap-4" dir="ltr">
                        <h3 class="text-xl font-black text-blue-800 bg-blue-50 px-6 py-2 rounded-xl border border-blue-200 en-text">✍️ Correct / Rewrite</h3>
                        <div class="flex gap-3">
                            <div class="bg-purple-100 text-purple-800 px-4 py-2 rounded-full font-bold border border-purple-200 en-text shadow-sm text-sm md:text-base">Q: ${state.correctIndex + 1} / ${correctQuestions.length}</div>
                            <div class="bg-green-100 text-green-800 px-4 py-2 rounded-full font-bold border border-green-200 en-text shadow-sm text-sm md:text-base">Score: ${state.score}</div>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-3xl border-2 border-gray-100 relative overflow-hidden shadow-sm" dir="ltr">
                        <div class="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                        <h4 class="text-2xl font-bold text-gray-800 en-text mb-8 pl-4 leading-relaxed">${q.text}</h4>
                        <div class="pl-4">
            `;

            let inputStyle = "input-field";
            if (state.correctShowAnswer) {
                const userAns = state.correctInput.trim().toLowerCase();
                let isCorrect = (userAns === q.correctAnswer.toLowerCase() || 
                                (q.correctAnswer === "learned" && userAns === "learnt") ||
                                (q.correctAnswer === "might" && userAns === "may"));
                inputStyle += isCorrect ? " input-correct" : " input-wrong";
            }

            html += `<input type="text" ${state.correctShowAnswer ? 'disabled' : ''} value="${state.correctInput}" oninput="handleInput(this.value)" placeholder="Type your answer here..." class="${inputStyle}">`;

            if (state.correctShowAnswer) {
                html += `<div class="mt-6 p-4 rounded-xl bg-green-50 border border-green-200 text-center fade-in">
                            <p class="text-green-600 font-bold en-text text-xl">✅ Correct Answer: ${q.correctAnswer}</p>
                         </div>`;
            }

            html += `
                        </div>
                    </div>
                    
                    <div class="mt-10 flex justify-center gap-4" dir="ltr">
                        ${!state.correctShowAnswer 
                            ? `<button onclick="revealCorrectAnswer()" class="px-10 py-3 rounded-full font-black text-xl transition-all text-white bg-blue-600 hover:bg-blue-700 hover:scale-105 shadow-lg en-text">Show Answer 👁️</button>`
                            : `<button onclick="nextCorrectQuestion()" class="px-10 py-3 rounded-full font-black text-xl transition-all text-white bg-green-600 hover:bg-green-700 hover:scale-105 shadow-lg en-text">${state.correctIndex === correctQuestions.length - 1 ? 'See Results 📊' : 'Next Question ➡️'}</button>`
                        }
                    </div>
                </div>
            `;
            return html;
        }

        function render() {
            const root = document.getElementById('app-root');
            let content = renderHeader() + `<div class="glass-card p-6 md:p-10 min-h-[500px]">`;
            
            if (state.activeTab === 'learn') content += renderLearn();
            else if (state.activeTab === 'choose') content += renderChoose();
            else if (state.activeTab === 'correct') content += renderCorrect();
            
            content += `</div>`;
            root.innerHTML = content;
        }

        // Initialize App
        document.addEventListener("DOMContentLoaded", () => {
            render();
        });
    </script>
</body>
</html>
